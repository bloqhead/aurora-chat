name = "aurora-chat"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for user accounts
[[kv_namespaces]]
binding = "USERS"
id = "c56e8fc81bf44e54a515838453ae30f0"
preview_id = "73272500f3e94737b472dc80490e2225"

# Durable Object for the chat room
[[durable_objects.bindings]]
name = "CHATROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

# Environment variables — set JWT_SECRET via `wrangler secret put JWT_SECRET`
# Do NOT put the actual secret in this file
[vars]
# JWT_SECRET is set as a secret, not here
